<!DOCTYPE html>

<!---Background video by https://pixabay.com/users/gam-ol-2829280/-->
<html>
    
<head lang="en">

    <meta charset="UTF-8">

    <title> Arcade </title>

    <link rel="icon" type="image/png" href="./assets/images/favicon.png">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="load-window">

        <div class="load-box"> Loading Arcade </div>

        <div class="progress-bar">

            <div class="progression"></div>

        </div>

    </div>

    <nav class="nav-bar">

        <h1 class="nav-brand">Arcade</h1>
    
        <img class="settings-icon" /> 

    </nav>

    <div class="main-window-container">

        <div class="game-page-window">

            <div class="settings">

                <div class="settings-side-bar">

                    <div class="title-settings"> Settings </div>

                    <div class="theme-toggle">Dark Theme </div>

                    <div class="toggle-button">

                        <div class="toggleable-button"></div>

                    </div>

                </div>

            </div>

            <div class="game-selection-window">

                <div class="game-container">

                    <!--Snake-->

                    <a class="snake-game" href="Snake.html">

                        <img class="snake-img" src="snake.jpg">

                        <span class="snake-title"> Snake </span>
                    </a>
                
                    <!---Mole--->

                    <a class="gravity-game" href="Mole.html">

                        <img class="gravity-img" src="mole.png">

                        <span class="gravity-title"> Mole </span>
                    </a>

                    <!---Pacman--->

                    <a class="tetris-game" href="Pacman.html">

                        <img class="tetris-img" src="Pacman.png" />

                        <span class="tetris-title"> Pacman </span>

                    </a>
                
                    <!---Flappy Bird ---> 

                    <a class="pi-sequencing-game" href="flappybird.html">

                        <img class="PI-img" src="Flappy Bird.png">

                        <span class="PI-title"> Flappy </span>

                    </a>
                
                </div>

            </div>
            
            <video class="loop-background" src="background 2.mp4" autoplay loop muted playsinline></video>

        </div>

    </div>

    <script src="https://unpkg.com/lenis@1.3.23/dist/lenis.min.js"></script>

    <script src="script.js"></script>
    
</body>

</html>
